name: ESP32 Build and Flash

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build ESP32 project
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v6.0
        target: esp32
        path: 'hello'
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware
        path: |
          hello/build/bootloader/bootloader.bin
          hello/build/partition_table/partition-table.bin
          hello/build/hello.bin
          hello/build/hello.elf
          hello/build/flasher_args.json
          hello/build/flash_args
          wokwi.toml
          diagram.json

  flash:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: esp32-firmware
        path: .
    
    - name: Test firmware on Wokwi
      uses: wokwi/wokwi-ci-action@v1
      with:
        token: ${{ secrets.WOKWI_CLI_TOKEN }}
        path: .
        elf: hello/build/hello.elf
        timeout: 20000
        expect_text: "Hello, ESP32!"
        fail_text: "Guru Meditation"
